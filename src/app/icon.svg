<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark stone background -->
  <rect width="32" height="32" rx="5" fill="#1a1714"/>
  <!-- Subtle gold border -->
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="4" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.35"/>

  <!-- Three battlements (merlons) -->
  <rect x="7"  y="6" width="4" height="6" rx="0.4" fill="#c9a84c"/>
  <rect x="14" y="6" width="4" height="6" rx="0.4" fill="#c9a84c"/>
  <rect x="21" y="6" width="4" height="6" rx="0.4" fill="#c9a84c"/>

  <!-- Tower body -->
  <rect x="7" y="12" width="18" height="12" fill="#c9a84c"/>

  <!-- Narrow slit windows on each side -->
  <rect x="9"  y="14.5" width="1.8" height="4" rx="0.3" fill="#1a1714"/>
  <rect x="21.2" y="14.5" width="1.8" height="4" rx="0.3" fill="#1a1714"/>

  <!-- Gothic pointed arch (gate) -->
  <path d="M13.5 24 L13.5 21 C13.5 18.5 16 17 16 17 C16 17 18.5 18.5 18.5 21 L18.5 24 Z" fill="#1a1714"/>

  <!-- Base / footing -->
  <rect x="5" y="24" width="22" height="2.5" rx="0.5" fill="#c9a84c"/>

  <!-- Very subtle horizontal line at merlon base -->
  <rect x="7" y="11.5" width="18" height="0.5" fill="#1a1714" opacity="0.3"/>
</svg>
